name: Update Hugo version

on:
  schedule:
    # 每周一 03:00 UTC 检查一次
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hugo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve versions
        id: versions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current="$(cat .hugo-version)"
          latest="$(gh api repos/gohugoio/hugo/releases/latest --jq '.tag_name' | sed 's/^v//')"

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"

          if [ "$current" = "$latest" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Hugo is already up to date ($current)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Hugo update available: $current -> $latest"
          fi

      - name: Bump .hugo-version and commit
        if: steps.versions.outputs.changed == 'true'
        shell: bash
        env:
          LATEST: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail

          printf '%s\n' "$LATEST" > .hugo-version

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .hugo-version
          git commit -m "ci: bump Hugo to ${LATEST}"
          git push
