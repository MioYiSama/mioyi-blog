name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.163.0"
      HUGO_CACHEDIR: /tmp/hugo_cache_runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Disable git quotePath
        run: git config core.quotePath false

      - name: Install Hugo
        shell: bash
        run: |
          set -euo pipefail

          case "$(dpkg --print-architecture)" in
            amd64) HUGO_ARCH="linux-amd64" ;;
            arm64) HUGO_ARCH="linux-arm64" ;;
            *)
              echo "Unsupported architecture: $(dpkg --print-architecture)" >&2
              exit 1
              ;;
          esac

          HUGO_TARBALL="hugo_extended_${HUGO_VERSION}_${HUGO_ARCH}.tar.gz"
          HUGO_URL="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${HUGO_TARBALL}"

          curl -fsSL "$HUGO_URL" -o "$RUNNER_TEMP/$HUGO_TARBALL"
          tar -xzf "$RUNNER_TEMP/$HUGO_TARBALL" -C "$RUNNER_TEMP"
          install "$RUNNER_TEMP/hugo" /usr/local/bin/hugo

      - name: Setup Cache
        uses: actions/cache@v5
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: ${{ runner.os }}-hugo${{ env.HUGO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo${{ env.HUGO_VERSION }}-${{ hashFiles('**/go.sum') }}

      - name: Build with hugo
        run: hugo --minify --gc
        env:
          HUGO_ENV: production
          HUGO_ENVIRONMENT: production

      - name: Debug hugo info
        run: hugo config && hugo version

      - name: Precompress with zstd
        run: chmod +x ./zstd.sh && ./zstd.sh

      - name: Deploy via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          ARGS: -az --delete --no-perms --compress-choice=lz4
          SOURCE: public/
          TARGET: /var/www/blog
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
